# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  BINARY: '{{.ROOT_DIR}}/dist/omnistash'
  BUILD_TARGETS: "linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run {{.CLI_ARGS | default "./..."}}

  format:
    desc: Run golangci-lint
    cmds:
      - golangci-lint fmt {{.CLI_ARGS | default "./..."}}

  clean:
    desc: Remove build artifacts (bin/, dist/, .coverage/)
    cmds:
      - rm -rf {{.ROOT_DIR}}/dist {{.ROOT_DIR}}/.coverage

  build:
    desc: Build the omnistash registry binary to bin/omnistash
    cmds:
      - go build -trimpath -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" -o {{.BINARY}} ./cmd/omnistash

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run unit tests with race detector
    cmds:
      - go test -race ./...

  test:coverage:
    desc: Run unit tests with coverage and generate an HTML report
    cmds:
      - mkdir -p {{.ROOT_DIR}}/.coverage
      - go test -coverprofile={{.ROOT_DIR}}/.coverage/coverage.out $(go list ./... | grep -v 'test$')
      - go tool cover -html={{.ROOT_DIR}}/.coverage/coverage.out -o {{.ROOT_DIR}}/.coverage/coverage.html
      - go tool cover -func={{.ROOT_DIR}}/.coverage/coverage.out | tail -1
      - echo "Coverage report @ {{.ROOT_DIR}}/.coverage/coverage.html"

  build:all:
    desc: Cross-compile for all platforms to dist/
    cmds:
      - mkdir -p dist
      - |
        for target in {{.BUILD_TARGETS}}; do
          GOOS=${target%/*}
          GOARCH=${target#*/}
          case $GOOS in
            windows) EXT=".exe" ;;
            *)       EXT=""     ;;
          esac
          echo "building $GOOS/$GOARCH..."
          GOOS=$GOOS GOARCH=$GOARCH go build -trimpath \
            -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" \
            -o dist/omnistash_${GOOS}_${GOARCH}${EXT} ./cmd/omnistash
          echo "done -> dist/omnistash_${GOOS}_${GOARCH}${EXT}"
        done
      - cd dist && sha256sum omnistash_* > checksums.txt
