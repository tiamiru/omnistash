name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      junit-uploaded: ${{ steps.upload-junit.conclusion == 'success' }}
      coverage-uploaded: ${{ steps.upload-coverage.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Check for test files
        id: has-tests
        run: |
          count=$(find . -name '*_test.go' | wc -l)
          echo "Found $count test file(s)"
          echo "found=$([[ $count -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: run-tests
        if: steps.has-tests.outputs.found == 'true'
        run: gotestsum --junitfile junit.xml -- -race -coverprofile=coverage.out ./...

      - uses: actions/upload-artifact@v7
        id: upload-junit
        if: steps.run-tests.conclusion != 'skipped'
        with:
          name: junit
          path: junit.xml
          retention-days: 1

      - uses: actions/upload-artifact@v7
        id: upload-coverage
        if: steps.run-tests.conclusion != 'skipped'
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !cancelled() && needs.test.outputs.junit-uploaded == 'true' }}
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          name: junit

      - uses: dorny/test-reporter@v3
        with:
          name: Go Tests
          path: junit.xml
          reporter: java-junit

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.outputs.coverage-uploaded == 'true'
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "coverage"
          coverage-file-name: "coverage.out"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Dry-run build
        run: go build -trimpath -o /dev/null ./cmd/omnistash
