name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: gotestsum --junitfile junit.xml -- -race -coverprofile=coverage.out ./...

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Go Tests
          path: junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  coverage:
    name: Coverage report
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: fgrosse/go-coverage-report@v1.3.0
        with:
          coverage-artifact-name: "coverage"
          coverage-file-name: "coverage.out"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: vars.ENABLE_BUILD_STEP == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Dry-run build
        run: go build -trimpath -o /dev/null ./cmd/omnistash
